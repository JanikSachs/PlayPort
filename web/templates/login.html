<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - PlayPort</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
    <section class="hero is-fullheight">
        <div class="hero-body">
            <div class="container">
                <div class="columns is-centered">
                    <div class="column is-4">
                        <div class="has-text-centered mb-5">
                            <h1 class="title is-2" style="color: #F97316;">PlayPort</h1>
                            <p class="subtitle is-5">Transfer your playlists between music platforms</p>
                        </div>
                        <div class="box">
                            <h2 class="title is-4 has-text-centered">Log In</h2>

                            {{if .Error}}
                            <div class="notification is-danger is-light">
                                {{.Error}}
                            </div>
                            {{end}}

                            <form method="POST" action="/login">
                                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

                                <div class="field">
                                    <label class="label">Username</label>
                                    <div class="control">
                                        <input class="input" type="text" name="username" placeholder="Username" required autofocus>
                                    </div>
                                </div>

                                <div class="field">
                                    <label class="label">Password</label>
                                    <div class="control">
                                        <input class="input" type="password" name="password" placeholder="Password" required>
                                    </div>
                                </div>

                                <div class="field mt-5">
                                    <div class="control">
                                        <button class="button is-primary is-fullwidth" type="submit" style="background-color: #F97316; border-color: #F97316;">Log In</button>
                                    </div>
                                </div>
                            </form>

                            <hr>
                            <p class="has-text-centered">
                                Don't have an account? <a href="/register">Register</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
